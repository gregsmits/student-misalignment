#ollama service

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ${OLLAMA_MODELS_DIR:-~/.ollama/models}:/root/.ollama/models
    entrypoint:
      - /bin/sh
      - -c
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama list | grep -q 'llama3' || ollama pull llama3
        wait

  neo4j:
    image: neo4j:5.15.0
    container_name: edukg_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j-data:/data
      - ./data/kg/build_kg.cypher:/scripts/build_kg.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  neo4j-init:
    image: neo4j:5.15.0
    container_name: edukg_neo4j_init
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - LANG=C.UTF-8
      - JAVA_TOOL_OPTIONS=-Dfile.encoding=UTF-8
    entrypoint:
      - /bin/sh
      - -c
      - |
        cypher-shell -a bolt://neo4j:7687 -u "${NEO4J_USER}" -p "${NEO4J_PASSWORD}" -f /scripts/build_kg.cypher
        if [ -f /scripts/notions_weights.cypher ]; then
          cypher-shell -a bolt://neo4j:7687 -u "${NEO4J_USER}" -p "${NEO4J_PASSWORD}" -f /scripts/notions_weights.cypher
        fi
    volumes:
      - ./data/kg/build_kg.cypher:/scripts/build_kg.cypher:ro
      - ./data/kg/notions_weights.cypher:/scripts/notions_weights.cypher:ro
    restart: "no"

volumes:
  ollama_data:
    driver: local
  neo4j-data:
    driver: local
